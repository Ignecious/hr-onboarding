<div class="training-list">
  <div class="page-header">
    <h2>My Training</h2>
    <p>Complete all assigned courses to finish your onboarding</p>
  </div>

  <div *ngIf="loading" class="loading-container">
    <p-progressBar mode="indeterminate" [style]="{'height': '4px'}"></p-progressBar>
  </div>

  <div class="courses-grid" *ngIf="!loading && courses.length > 0">
    <p-card *ngFor="let course of courses" styleClass="course-card" [class]="'status-' + course.status">
      <ng-template pTemplate="header">
        <div class="course-card-header">
          <p-tag [value]="getStatusLabel(course.status)"
            [severity]="getStatusSeverity(course.status)"></p-tag>
          <span *ngIf="course.category" class="course-category">{{ course.category }}</span>
        </div>
      </ng-template>

      <h3 class="course-title">{{ course.title }}</h3>
      <p class="course-desc">{{ course.description }}</p>

      <div class="course-meta">
        <span><i class="pi pi-clock"></i> {{ course.duration }}</span>
        <span><i class="pi pi-calendar"></i> Due: {{ formatDate(course.dueDate) }}</span>
      </div>

      <div class="course-progress" *ngIf="course.status !== 'not_started'">
        <div class="progress-label">
          <span>Progress</span>
          <span>{{ course.progress }}%</span>
        </div>
        <p-progressBar [value]="course.progress" [style]="{'height': '8px'}"></p-progressBar>
      </div>

      <ng-template pTemplate="footer">
        <p-button [label]="course.status === 'completed' ? 'Review' : course.status === 'in_progress' ? 'Continue' : 'Start'"
          [icon]="course.status === 'completed' ? 'pi pi-eye' : 'pi pi-play'"
          [styleClass]="course.status === 'completed' ? 'p-button-outlined' : ''"
          (onClick)="viewCourse(course)">
        </p-button>
      </ng-template>
    </p-card>
  </div>

  <div *ngIf="!loading && courses.length === 0" class="empty-state">
    <i class="pi pi-book"></i>
    <p>No courses assigned yet.</p>
  </div>
</div>
