<div class="employee-list-container">
  <div class="page-header">
    <h2>Employees</h2>
    <p-button label="Create New Employee" icon="pi pi-plus" routerLink="/employees/create"></p-button>
  </div>

  <p-card>
    <div class="filter-bar">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input pInputText type="text" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Search employees..." />
      </span>
      <p-dropdown [options]="statusOptions" [(ngModel)]="selectedStatus" (onChange)="applyFilter()" optionLabel="label" optionValue="value" placeholder="Filter by Status" styleClass="ml-2"></p-dropdown>
    </div>

    <p-table
      [value]="filteredEmployees"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20]"
      [tableStyle]="{'min-width': '80rem'}"
      [rowHover]="true"
      styleClass="mt-3">
      <ng-template pTemplate="header">
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Role</th>
          <th>Status</th>
          <th>Progress</th>
          <th>Start Date</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-employee>
        <tr>
          <td>{{ employee.employeeId }}</td>
          <td>{{ employee.firstName }} {{ employee.lastName }}</td>
          <td>{{ employee.department }}</td>
          <td>{{ employee.role }}</td>
          <td><p-tag [value]="employee.onboardingStatus" [severity]="getStatusSeverity(employee.onboardingStatus)"></p-tag></td>
          <td>
            <div class="progress-cell">
              <p-progressBar [value]="employee.completionPercentage" [style]="{'height': '8px'}"></p-progressBar>
              <span class="progress-text">{{ employee.completionPercentage }}%</span>
            </div>
          </td>
          <td>{{ employee.startDate }}</td>
          <td>
            <p-button icon="pi pi-eye" styleClass="p-button-text p-button-sm" pTooltip="View Details" (onClick)="viewEmployee(employee)"></p-button>
            <p-button icon="pi pi-upload" styleClass="p-button-text p-button-sm" pTooltip="Upload Documents" (onClick)="uploadDocs(employee)"></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="8" class="text-center">No employees found.</td></tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
